# Validation Metrics History (snapshot 2026-07-04)
# Verbatim archive of .agents/VALIDATION_METRICS.yaml before the registry was
# trimmed to durable, currently-enforced gates. Pass-specific historical gates
# live here; the live registry points at this file.

version: 1
purpose: "Metric registry for repeatable agent validation in this repository."

global_gates:
  state_recorded:
    metric: "state snapshot or final summary exists"
    threshold: "present"
    evidence: "final response, change log, or project-state-manager record"
  commands_reported:
    metric: "validation commands and outcomes reported"
    threshold: "all attempted checks listed"
    evidence: "final response"
  no_unknown_deletions:
    metric: "unknown or user-authored files deleted without explicit approval"
    threshold: 0
    evidence: "git diff, cleanup inventory"

code_quality:
  tests:
    metric: "pytest exit code"
    threshold: 0
    command: "python -m pytest -q"
  lint:
    metric: "ruff check exit code"
    threshold: 0
    command: "python -m ruff check ."
  package_import:
    metric: "CLI import/list command exit code"
    threshold: 0
    command: "python -m mclab --help"
  bootstrap_verify:
    metric: "bootstrap verification exit code"
    threshold: 0
    command: "python scripts/bootstrap_and_run.py --verify"

simulation_runs:
  required_artifacts:
    metric: "required output files"
    threshold: "config.yaml, summary.json, notes.md, log.csv, report.html present"
    evidence: "outputs/<run>/"
  sample_count:
    metric: "summary.samples"
    threshold: "> 0"
    evidence: "outputs/<run>/summary.json"
  duration:
    metric: "summary.duration"
    threshold: "> 0 seconds"
    evidence: "outputs/<run>/summary.json"
  report_sections:
    metric: "HTML report sections"
    threshold: "Learning Focus, Reproduce, Summary, Artifacts present"
    evidence: "outputs/<run>/report.html"

lab01_mass_spring_damper:
  energy_logged:
    metric: "energy columns"
    threshold: "kinetic_energy and potential_energy present when applicable"
    evidence: "outputs/<run>/log.csv"
  response_bounded:
    metric: "max_abs_position"
    threshold: "finite and lesson-appropriate"
    evidence: "outputs/<run>/summary.json"

lab02_pid:
  steady_state_error:
    metric: "absolute steady_state_error"
    threshold: "<= 0.05 m for default tracking demos"
    evidence: "outputs/<run>/summary.json"
  overshoot:
    metric: "overshoot_percent"
    threshold: "<= 20 percent unless the lesson intentionally demonstrates overshoot"
    evidence: "outputs/<run>/summary.json"
  settling_time:
    metric: "settling_time"
    threshold: "finite for stable comparison demos"
    evidence: "outputs/<run>/summary.json"

lab03_2dof:
  final_joint_error:
    metric: "final_joint_error_norm"
    threshold: "<= 0.1 rad norm for joint-space demos"
    evidence: "outputs/<run>/summary.json"
  final_task_error:
    metric: "final_task_error_norm"
    threshold: "<= 0.05 m norm for task-space demos"
    evidence: "outputs/<run>/summary.json"
  jacobian_condition:
    metric: "max_jacobian_condition"
    threshold: "<= 20 OK, <= 100 caution, > 100 singularity lesson or inspect"
    evidence: "outputs/<run>/summary.json"

lab04_panda:
  final_cartesian_error:
    metric: "final_cartesian_error_cm"
    threshold: "<= 2.0 cm for reach demos"
    evidence: "outputs/<run>/summary.json"
  actuator_effort:
    metric: "max_abs_tau_cmd"
    threshold: "<= 60 force/torque proxy unless stress lesson"
    evidence: "outputs/<run>/summary.json"
  virtual_wall_penetration:
    metric: "max_wall_penetration_cm"
    threshold: "<= 5.0 cm for stable wall demos"
    evidence: "outputs/<run>/summary.json"
  virtual_wall_force:
    metric: "max_abs_virtual_wall_force"
    threshold: "<= 80 for stable wall demos"
    evidence: "outputs/<run>/summary.json"

paper_tutorial:
  paper_only_validation:
    metric: "paper-only validation for paper/.agents-only edits"
    threshold: "Tectonic exit code 0; final rerun segment has 0 citation/reference/rerun/overfull/underfull warnings; citation/provenance diff has no missing used keys; latest PDF page count and byte size recorded"
    command: "$env:PYTHONUTF8='1'; python C:\\Users\\ycpig\\.codex\\plugins\\cache\\openai-bundled\\latex\\0.2.4\\scripts\\compile_latex.py C:\\Users\\ycpig\\manipulator-control-tutorial\\paper\\main.tex --compiler tectonic --output-directory C:\\Users\\ycpig\\manipulator-control-tutorial\\paper --json"
    evidence: "paper/main.pdf, .agents/validation/robotics_foundations_validation_summary.yaml, citation/provenance check output, .agents/CURRENT_STATE.md, .agents/PAPER_VERSION_LOG.md"
  source_coverage:
    metric: "major technical claims with citation or derivation"
    threshold: "100 percent for publication-facing claims"
    evidence: "paper/*.tex, bibliography, traceability record"
  beginner_readability:
    metric: "undefined core terms before use"
    threshold: 0
    evidence: "paper-novice-reader review"
  equation_traceability:
    metric: "important equations explained in prose"
    threshold: "all key equations"
    evidence: "paper/*.tex"
  section3_lti_transfer_function_clarity:
    metric: "Section 3 explains LTI systems, response types, transfer functions, frequency response, and final-value intuition with beginner-facing scaffolding and explicit assumptions"
    threshold: "system/input/output/state definitions, RLC-MSD mapping table, staged linearity explanation, zero-input/zero-state/impulse/step response table, causal convolution caveat, transfer-function definition as Laplace transform of impulse response, compliance/admittance/impedance unit table, H(0) static-compliance caveat, final-value-theorem caveats, and LTI checklist present"
    evidence: "paper/sections/03_lti_system.tex plus rendered PDF pages 14-20"
  section2_history_concept_clarity:
    metric: "Section 2 explains why impedance emerged from changing-signal transmission problems and distinguishes port variables, resistance, reactance, phasors, static stiffness/compliance, and mechanical impedance"
    threshold: "power-conjugate effort/flow caveat, static stiffness/compliance caveat, per-unit R'/L'/C'/G' line elements, telegrapher equations, distortionless-line condition, phasor assumptions, reactance signs, damping-power sign, and mechanical impedance sign/frequency interpretation present"
    evidence: "paper/sections/02_impedance.tex plus rendered PDF pages 5-14"
  bibliography_cleanup_and_convergence:
    metric: "latest reference-management pass keeps BibTeX keys consistent, confirms final citation convergence, and removes internal cache/retrieval notes from the visible bibliography"
    threshold: "0 missing cite keys, 0 duplicate BibTeX keys, final log segment after main.bbl has 0 citation warnings, 0 undefined-reference warnings, and 0 rerun warnings; PDF text has 0 occurrences of unresolved citation markers and internal phrases such as `Ignored local PDF cache`, `source URL recorded in sources.md`, `Metadata-only`, `bot-check`, and `automated retrieval`; local PDF provenance remains in sources.md or BibTeX comments rather than printed notes"
    evidence: "paper/references/refs.bib, paper/references/sources.md, review agents Poincare the 2nd and Mendel the 2nd, bundled Tectonic compile with explicit --compiler tectonic, bundled Python/PyPDF text check, and rendered PDF page 87"
  control_map_pose_scope_and_wall_damping:
    metric: "latest multi-agent pass adds a beginner control-mode map, fixes translational-position versus full-pose scope in Section 6, and clarifies one-sided virtual-wall damping"
    threshold: "Section 6 contains table caption `초심자용 제어 방식 구분`; Section 6 states that x in R^3 means translational end-effector position only and that full pose impedance requires rotation error, wrench, and geometric Jacobian; virtual-wall text says damping turns on only while penetrating further and does not pull the endpoint inward while exiting; stale wording `손끝이 공간의 어디에 있는지` and `로봇이 벽에서 빠져나오는 순간` is absent"
    evidence: "paper/sections/06_impedance_control.tex, review agents Cicero the 2nd, Carson the 2nd, and Ramanujan the 2nd, bundled Tectonic compile with explicit --compiler tectonic, bundled Python/PyPDF text check, and rendered PDF pages 53, 59, and 69"
  resonance_energy_and_conclusion_model:
    metric: "latest multi-agent pass clarifies RLC resonance cancellation, corrects damping-ratio energy-decay interpretation, and makes the conclusion start with a memorable virtual spring-damper mental model"
    threshold: "Section 4 states that series resonance cancellation means the source sees zero net imaginary opposition, not vanished inductor/capacitor voltages; Section 5 says underdamped amplitude decays as e^{-zeta omega_n t} and energy roughly as e^{-2 zeta omega_n t}, and warns zeta>=1 has no cycle-based energy-loss reading; Conclusion opens with the end-effector as a target-tied virtual spring-damper and frames MuJoCo logs/plots as observation tools; stale phrases `감쇠가 크면 한 주기 동안 많은 에너지가` and `이 논문은 임피던스의 전기적 기원` are absent"
    evidence: "paper/sections/04_electric_system.tex, paper/sections/05_mechanical_system.tex, paper/sections/09_conclusion.tex, review agents Hooke the 2nd, Singer the 2nd, and Carver the 2nd, bundled Tectonic compile with explicit --compiler tectonic, bundled Python/PyPDF text check, and rendered PDF pages 33, 44, 82, and 83"
  direction_scope_energy_wording:
    metric: "latest multi-agent pass clarifies impedance/admittance reading direction, Lab04 educational scope, and stable virtual-potential curvature without changing simulator code"
    threshold: "Introduction states that cause/response is a chosen reading direction; Section 6 describes the virtual spring potential as an upward-opening energy bowl with positive curvature/Hessian; the incorrect phrase '오목한 곡면' is absent; Lab04 paragraph says tau_cmd/current_proxy are actuator_force-derived effort records rather than hardware force/torque signals"
    evidence: "paper/sections/01_introduction.tex, paper/sections/06_impedance_control.tex, paper/sections/07_mujoco_lab_design.tex, review agents Bohr the 2nd, Noether the 2nd, and Banach the 2nd, bundled Tectonic compile, bundled Python/PyPDF text check, and rendered PDF pages 4, 65, and 73"
  frequency_and_pd_bridge:
    metric: "latest multi-agent pass clarifies early impedance history, separates free-oscillation frequency from forced-input frequency, and distinguishes positive definite from semidefinite virtual stiffness"
    threshold: "Section 2 history transition frames impedance as a practical long-line communication problem; Section 4 contains the phrase `두 주파수를 나누어 읽자` and separates omega_d from externally chosen omega; Section 6 states K_d=K_d^T succ0 for a closed energy bowl and says semidefinite zero-stiffness directions have no restoring force"
    evidence: "paper/sections/02_impedance.tex, paper/sections/04_electric_system.tex, paper/sections/06_impedance_control.tex, review agents Peirce the 2nd, Russell the 2nd, and Copernicus the 2nd, bundled Tectonic compile, bundled Python/PyPDF text check, and rendered PDF pages 9, 32, 65, and 66"
  plot_final_value_and_singularity_reading:
    metric: "latest multi-agent pass prevents common plot-reading and singularity-reading mistakes while keeping the appendix tone beginner-friendly"
    threshold: "Section 7 tells readers not to use the last plotted point as the final value until the tail is flat, velocity is near zero, and summary.json settling-time evidence is checked; Section 7 singularity wording uses absolute determinant, manipulability, and condition number rather than signed determinant shrinking; Appendix A closes by framing the notation questions as a small map for orientation"
    evidence: "paper/sections/07_mujoco_lab_design.tex, paper/sections/A_notation_checklist.tex, review agents Popper the 2nd, Parfit the 2nd, and Tesla the 2nd, bundled Tectonic compile, bundled Python/PyPDF page/text check, and rendered PDF pages 71, 73, and 85"
  parameter_choice_and_wall_force_sign:
    metric: "latest multi-agent pass clarifies the non-independent choice relation among stiffness, desired inertia, and natural frequency, fixes signed Lab04 virtual-wall force reading, and softens defensive scope wording"
    threshold: "Section 6 states k_d=m_d*omega_n^2 and says choosing two of k_d, m_d, and omega_n fixes the third; Section 7 says signed force_virtual_0 becomes more negative while its magnitude increases with penetration depth; Discussion frames Lab04 as an educational scale for reading plot traces rather than a real-robot performance verdict; stale wording about wall force simply increasing and complete operational-space performance guarantee is absent"
    evidence: "paper/sections/06_impedance_control.tex, paper/sections/07_mujoco_lab_design.tex, paper/sections/08_discussion.tex, review agents Confucius the 2nd, Lorentz the 2nd, and Ptolemy the 2nd, bundled Tectonic compile, bundled Python/PyPDF page/text check, and rendered PDF pages 63, 75, and 79"
  zero_state_sign_and_frequency_intuition:
    metric: "latest multi-agent pass clarifies zero-state versus zero-input shared dynamics, static contact sign conventions, and hand-feel mechanical-impedance frequency intuition"
    threshold: "Section 3 states signed static force depends on force/coordinate convention and gives f_wall≈-kδ for wall penetration; Section 4 says zero-state and zero-input are different experiments but share the same denominator/poles; Section 5 replaces abstract mechanical-impedance wording with slow-push spring, fast-shake mass, and damping-as-energy-loss intuition; stale phrases about `부호까지 쓰면 외력 기준` and `이 식은 각 요소가 ... 명확히` are absent"
    evidence: "paper/sections/03_lti_system.tex, paper/sections/04_electric_system.tex, paper/sections/05_mechanical_system.tex, review agents Raman the 2nd, Faraday the 2nd, and Wegener the 2nd, bundled Tectonic compile, bundled Python/PyPDF page/text check, and rendered PDF pages 21, 32, and 48"
  history_phasor_and_mechanical_sign:
    metric: "latest multi-agent pass connects telegraph/telephone history to phasor impedance and states the mechanical port force sign convention at the first definition"
    threshold: "Section 2 defines mechanical impedance using externally injected port force, states F_react=-F_in for reaction-force wording, and preserves Z_m=F_in/V_x=ms+b+k/s under the passive convention; the Heaviside/history transition says resistance alone explains DC flow but not frequency-dependent attenuation and phase delay; the complex-impedance bridge says a pulse or voice can be read one sinusoidal component at a time and calls impedance a record of magnitude ratio plus time offset; stale report-like phrases `역사적으로 impedance` and `핵심은 다음이다` are absent"
    evidence: "paper/sections/02_impedance.tex, review agents Erdos the 2nd, Euclid the 2nd, and Avicenna the 2nd, bundled Tectonic compile, bundled Python/PyPDF page/text check, and rendered PDF pages 8, 10, and 11"
  element_mapping_and_ratio_meaning:
    metric: "latest multi-agent pass prevents early capacitor-spring parameter inversion and clarifies why impedance can appear as force/velocity, force/position, or a broader force-motion design relation depending on context"
    threshold: "Introduction frames the MuJoCo lab as a small experiment map; Section 2 Table 2 maps capacitor C to spring compliance 1/k and names restoring terms q/C and kx; Discussion misconception table states that narrow frequency-domain mechanical impedance is force/velocity while robot impedance control designs the broader force-motion relation and static contact is read as force/position; table-reference particles do not render as forms like '표 35은'"
    evidence: "paper/sections/01_introduction.tex, paper/sections/02_impedance.tex, paper/sections/07_mujoco_lab_design.tex, paper/sections/08_discussion.tex, review agents Boole the 2nd, Hegel the 2nd, and Mencius the 2nd, bundled Tectonic compile, bundled Python/PyPDF text check, and rendered PDF pages 4, 9, and 77"
  admittance_flow_split:
    metric: "latest multi-agent pass distinguishes flow velocity, integrated position/error state, error admittance, and absolute mechanical admittance across Section 6, Discussion, and Appendix"
    threshold: "Section 6 defines Y_e(s)=V_e(s)/F_ext(s)=sC_e(s) and separately states Y_m(s)=V_x(s)/F_ext(s); moving-target caveat V_x=V_e+V_d present; Discussion effort-flow table says endpoint velocity is flow and position is integrated error/storage state; Discussion formula table uses Y_e for error-velocity admittance; Appendix A has separate Y_e and Y_m rows; Section 5 transition names capacitor-spring, inductor-mass, and resistor-damper roles in beginner-friendly prose"
    evidence: "paper/sections/05_mechanical_system.tex, paper/sections/06_impedance_control.tex, paper/sections/08_discussion.tex, paper/sections/A_notation_checklist.tex, review agents Nash the 2nd, Herschel the 2nd, and Nietzsche the 2nd, bundled Tectonic compile, bundled Python/PyPDF text check, and rendered PDF pages 37, 53, 76, 78, and 82"
  pde_and_frame_bridge:
    metric: "latest multi-agent pass reduces early math shock around the telegrapher equations and prevents frame-mixing in Jacobian-transpose force-to-torque interpretation"
    threshold: "Section 2 includes a pre-telegrapher-equation bridge explaining time variation, line-position variation, left/right side meaning, and tiny storage/loss elements; Section 6 states that xdot, force, and Jv translational components must be expressed in the same Cartesian frame and that tool-frame forces need rotation before tau=Jv^T f"
    evidence: "paper/sections/02_impedance.tex, paper/sections/06_impedance_control.tex, review agents Descartes the 2nd, Godel the 2nd, and Dewey the 2nd, bundled Tectonic compile, bundled Python/PyPDF page/text check, and rendered PDF pages 9-10 and 58-59"
  section4_electric_system_intuition:
    metric: "Section 4 explains resistor/inductor/capacitor/RLC behavior with beginner-facing physical intuition, sign conventions, and output-specific transfer functions"
    threshold: "Ohm units and numeric check, resistance geometry, passive sign convention, terminal voltage versus induced EMF, separated capacitor charge, C=epsilon A/d intuition, energy-return caveats, RLC state table, zero-initial transfer-function bridge, output-specific Q/Vc/I transfer functions, numeric omega_n/zeta example, and series-current resonance caveat present"
    evidence: "paper/sections/04_electric_system.tex plus rendered PDF pages 17-27"
  section5_mechanical_system_intuition:
    metric: "Section 5 explains mass-spring-damper behavior with beginner-facing physical intuition, energy/power interpretation, response metrics, and mechanical impedance derivation"
    threshold: "symbol/unit table, paired RLC/MSD energy-state bridge, 2nd-order definition, standard-form coefficient matching, force-displacement spring-energy area, negative energy-gradient force sign, mechanical power definition, net-force mass caveat, free/step/zero-initial definitions, underdamped-only omega_d caveat, numeric overshoot/settling example, and stepwise Z_m derivation present"
    evidence: "paper/sections/05_mechanical_system.tex plus rendered PDF pages 27-41"
  section5_msd_force_map_wording:
    metric: "latest multi-agent pass makes the first mass-spring-damper equation interpretation easier for beginners without weakening sign, energy, or impedance caveats"
    threshold: "after m*xddot + b*xdot + k*x = f, prose frames the equation as a small map of what external force must account for; list distinguishes inertia through acceleration, damping through velocity, and stiffness through displacement; sign convention states +b*xdot+k*x are moved-left terms, not actual physical force directions; energy distinction says mass and spring store energy while damper dissipates; impedance preview states ms+b+k/s uses externally supplied force over velocity"
    evidence: "paper/sections/05_mechanical_system.tex, review agents Rawls the 2nd, Boyle the 2nd, and Beauvoir the 2nd, bundled Tectonic compile, bundled Python/PyPDF page/text check, and rendered PDF pages 33-35"
  electric_mechanical_analogy:
    metric: "effort/flow, reactance, capacitor-spring mapping, energy exchange, and impedance-frequency bridges explained"
    threshold: "all five bridge points present"
    evidence: "paper/sections/02_impedance.tex, paper/sections/04_electric_system.tex, paper/sections/05_mechanical_system.tex"
  electric_mechanical_element_memory:
    metric: "readers can identify what each RLC/MSD element resists and whether it stores or dissipates energy"
    threshold: "resistor/damper, inductor/mass, capacitor/spring memory table present; C versus 1/k caveat present; RLC term interpretation present; phase/topology caveats present"
    evidence: "paper/sections/02_impedance.tex, paper/sections/04_electric_system.tex, paper/sections/05_mechanical_system.tex"
  response_metrics_clarity:
