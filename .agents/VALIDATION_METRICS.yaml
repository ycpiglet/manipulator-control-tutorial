version: 1
purpose: "Metric registry for repeatable agent validation in this repository."

global_gates:
  state_recorded:
    metric: "state snapshot or final summary exists"
    threshold: "present"
    evidence: "final response, change log, or project-state-manager record"
  commands_reported:
    metric: "validation commands and outcomes reported"
    threshold: "all attempted checks listed"
    evidence: "final response"
  no_unknown_deletions:
    metric: "unknown or user-authored files deleted without explicit approval"
    threshold: 0
    evidence: "git diff, cleanup inventory"

code_quality:
  tests:
    metric: "pytest exit code"
    threshold: 0
    command: "python -m pytest -q"
  coverage:
    metric: "statement coverage of src/mclab"
    threshold: ">= 80 percent (regression floor; local baseline 84 percent over 11212 statements, measured 2026-07-05)"
    command: "python -m pytest -q --cov=mclab --cov-report=term --cov-fail-under=80"
  lint:
    metric: "ruff check exit code"
    threshold: 0
    command: "python -m ruff check ."
  mypy_exact_debt:
    metric: "exact mypy diagnostic/all-src-source/contextual-suppression multisets under strict-definition config and prefix-rooted dependency provenance"
    threshold: "264 diagnostics across 29 error files and 87 source .py files; 8 contextual typing suppressions; 0 additions, removals, reintroductions, or multiplicity drift in normal validation"
    command: "python .agents/validation/check_mypy_baseline.py --python-version 3.11"
    evidence: ".agents/baselines/MAINT-01A-mypy-debt-v2.json, alias/re-export/structural-path/sibling-package/outside-prefix regressions, and native CPython 3.10/3.11/3.12 CI steps"
    named_residual: "disallow_any_explicit remains disabled; its 781 inherited diagnostics are not included in the 264-diagnostic active baseline"
  package_import:
    metric: "CLI import/list command exit code"
    threshold: 0
    command: "python -m mclab --help"
  bootstrap_verify:
    metric: "bootstrap verification exit code"
    threshold: 0
    command: "python scripts/bootstrap_and_run.py --verify"

documentation:
  newcomer_readme_contract:
    metric: "KR/EN semantic sections, public commands, CLI shape, local links/anchors, launchers, and repository maps"
    threshold: "all checker metrics pass; validation errors 0"
    command: "python .agents/validation/check_readme_contract.py"
    evidence: "CI simulator job output and tests/test_readme_contract.py"
  newcomer_quickstart_artifacts:
    metric: "recommended source launcher setup, doctor, and Lab01 artifacts on each desktop workflow OS"
    threshold: "launcher setup/app self-test and doctor exit 0; every README core artifact present; plots/*.png count >= 1"
    evidence: ".github/workflows/desktop.yml on Windows, Ubuntu, and macOS"

simulation_runs:
  required_artifacts:
    metric: "required output files"
    threshold: "config.yaml, summary.json, notes.md, log.csv, report.html present"
    evidence: "outputs/<run>/"
  sample_count:
    metric: "summary.samples"
    threshold: "> 0"
    evidence: "outputs/<run>/summary.json"
  duration:
    metric: "summary.duration"
    threshold: "> 0 seconds"
    evidence: "outputs/<run>/summary.json"
  report_sections:
    metric: "HTML report sections"
    threshold: "Learning Focus, Reproduce, Summary, Artifacts present"
    evidence: "outputs/<run>/report.html"

lab01_mass_spring_damper:
  energy_logged:
    metric: "energy columns"
    threshold: "kinetic_energy and potential_energy present when applicable"
    evidence: "outputs/<run>/log.csv"
  response_bounded:
    metric: "max_abs_position"
    threshold: "finite and lesson-appropriate"
    evidence: "outputs/<run>/summary.json"

lab02_pid:
  steady_state_error:
    metric: "absolute steady_state_error"
    threshold: "<= 0.05 m for default tracking demos"
    evidence: "outputs/<run>/summary.json"
  overshoot:
    metric: "overshoot_percent"
    threshold: "<= 20 percent unless the lesson intentionally demonstrates overshoot"
    evidence: "outputs/<run>/summary.json"
  settling_time:
    metric: "settling_time"
    threshold: "finite for stable comparison demos"
    evidence: "outputs/<run>/summary.json"

lab03_2dof:
  final_joint_error:
    metric: "final_joint_error_norm"
    threshold: "<= 0.1 rad norm for joint-space demos"
    evidence: "outputs/<run>/summary.json"
  final_task_error:
    metric: "final_task_error_norm"
    threshold: "<= 0.05 m norm for task-space demos"
    evidence: "outputs/<run>/summary.json"
  jacobian_condition:
    metric: "max_jacobian_condition"
    threshold: "<= 20 OK, <= 100 caution, > 100 singularity lesson or inspect"
    evidence: "outputs/<run>/summary.json"

lab04_panda:
  final_cartesian_error:
    metric: "final_cartesian_error_cm"
    threshold: "<= 2.0 cm for reach demos"
    evidence: "outputs/<run>/summary.json"
  actuator_effort:
    metric: "max_abs_tau_cmd"
    threshold: "<= 60 force/torque proxy unless stress lesson"
    evidence: "outputs/<run>/summary.json"
  virtual_wall_penetration:
    metric: "max_wall_penetration_cm"
    threshold: "<= 5.0 cm for stable wall demos"
    evidence: "outputs/<run>/summary.json"
  virtual_wall_force:
    metric: "max_abs_virtual_wall_force"
    threshold: "<= 80 for stable wall demos"
    evidence: "outputs/<run>/summary.json"

paper_tutorial:
  # Durable, currently-enforced gates only. Historical pass-specific gates
  # (one entry per multi-agent manuscript pass) are archived verbatim in
  # .agents/archive/VALIDATION_METRICS_HISTORY.yaml and stay out of this
  # registry so every gate here is repeatable on any machine.
  paper_build:
    metric: "LaTeX build exit code and warning-free final rerun segment"
    threshold: "exit 0; final rerun segment has 0 citation/reference/rerun/overfull/underfull warnings"
    command: "tectonic --keep-logs paper/main.tex  # CI and any machine with Tectonic; the bundled compile_latex.py remains a local alternative"
    evidence: "paper/main.pdf, CI paper-build job, .agents/PAPER_VERSION_LOG.md"
  citation_provenance_coverage:
    metric: "used citation keys present in refs.bib and sources.md; no duplicate bib keys"
    threshold: "exit 0"
    command: "python .agents/validation/check_citation_coverage.py"
    evidence: "CI paper-gates job output"
  formula_and_marker_checks:
    metric: "manuscript formula/marker validation script failures"
    threshold: "0 failures, exit 0"
    command: "python .agents/validation/validate_robotics_foundations.py"
    evidence: "CI paper-gates job output, .agents/validation/robotics_foundations_validation_summary.yaml"
  source_coverage:
    metric: "major technical claims with citation or derivation"
    threshold: "100 percent for publication-facing claims"
    evidence: "paper/*.tex, bibliography, traceability record"
  beginner_readability:
    metric: "undefined core terms before use"
    threshold: 0
    evidence: "paper-novice-reader review"
  equation_traceability:
    metric: "important equations explained in prose"
    threshold: "all key equations"
    evidence: "paper/*.tex"
  derivation_step_completeness:
    metric: "High-severity derivation gaps (beginner blocked without external material)"
    threshold: "0 open High items in the derivation backlog; anchor checkpoint passes"
    command: "python .agents/validation/validate_robotics_foundations.py  # manuscript_derivation_gap_high_checkpoint"
    evidence: ".agents/DERIVATION_COMPLETENESS_PLAN.md backlog status"
  historical_pass_gates:
    metric: "pass-specific manuscript gates from previous multi-agent passes"
    threshold: "archived, not re-enforced"
    evidence: ".agents/archive/VALIDATION_METRICS_HISTORY.yaml"

ci:
  workflow_green:
    metric: "GitHub Actions CI jobs (simulator, paper-gates, paper-build)"
    threshold: "all jobs pass on push to main and on pull requests"
    evidence: ".github/workflows/ci.yml, Actions run log"

supply_chain:
  license_inventory_contract:
    metric: "LIC-01A candidate, target-cell, observation, and direct-producer-input closure"
    threshold: "checker exit 0; all 8 scanner-read locks hash-bound; missing metadata remains counted; compliance_status pending-lic-01; distribution closure unproven"
    command: "python scripts/generate_license_inventory.py --check && python .agents/validation/check_license_inventory.py"
    evidence: ".agents/supply_chain/license-inventory.json, CI simulator output, desktop matrix per-OS license evidence"

packaging:
  unsigned_development_identity:
    metric: "checkout-bound one-folder inventory, canonical archive bytes, unsigned marker, and bounded Python build provenance"
    threshold: "verify-only exit 0 on each supported desktop OS; exact locked package profile and RECORD fingerprint; stale transactions, POSIX mount/device crossings, and Windows reparse crossings rejected; cooperating operations serialized; hostile concurrent filesystem mutation out of scope"
    command: "python scripts/build_desktop.py --verify-only"
    evidence: "retained per-OS dist/MCLab-package/package-metrics.json and architecture-specific archive"
  independent_size_gates:
    metric: "one-folder and compressed archive bytes"
    threshold: "one-folder <= 400 MiB; compressed archive <= 300 MiB; both enforced independently"
    evidence: "package-metrics.json gates.one_folder and gates.archive in each desktop matrix artifact"

operations:
  ci_reproducibility:
    metric: "CI commands reproducible locally"
    threshold: "all CI commands have local equivalent"
    evidence: "workflow files and final report"
  cleanup_safety:
    metric: "cleanup candidates classified before deletion"
    threshold: "100 percent classified"
    evidence: "garbage-collection-manager inventory"
  secrets_exposure:
    metric: "new secrets committed or printed"
    threshold: 0
    evidence: "security review, git diff"
  rollback_defined:
    metric: "rollback plan for release-impacting changes"
    threshold: "present"
    evidence: "deployment-rollback-manager checklist"

agent_system:
  skill_structure:
    metric: "skill folders with SKILL.md and agents/openai.yaml"
    threshold: "100 percent for created skills"
    evidence: ".agents/skills/<skill>/ (repo mirror; working copy at ~/.codex/skills)"
  skill_frontmatter:
    metric: "valid name and description frontmatter"
    threshold: "100 percent"
    evidence: "manual validation or quick_validate.py"
  handoff_completeness:
    metric: "handoff packet fields completed"
    threshold: "all required fields or explicit N/A"
    evidence: ".agents/OPERATING_SYSTEM.md handoff packet"
