name: Desktop app smoke and unsigned builds

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop:
    name: Unsigned development build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    env:
      MCLAB_EVIDENCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg
    steps:
      - name: Checkout exact package evidence subject
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ env.MCLAB_EVIDENCE_SHA }}

      - name: Verify exact package evidence subject
        shell: bash
        run: |
          if [[ ! "$MCLAB_EVIDENCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Package evidence subject must be a lowercase 40-hex commit." >&2
            exit 1
          fi
          head_sha="$(git rev-parse --verify 'HEAD^{commit}')" || exit 1
          if [[ "$head_sha" != "$MCLAB_EVIDENCE_SHA" ]]; then
            echo "::error::Checked-out HEAD does not match the package evidence subject." >&2
            exit 1
          fi
          checkout_status="$(git status --porcelain=v1 --untracked-files=all)" || exit 1
          if [[ -n "$checkout_status" ]]; then
            echo "::error::Package evidence checkout is not clean." >&2
            exit 1
          fi

      - name: Bind packaged startup evidence path
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux|Windows|macOS) ;;
            *)
              echo "::error::Unsupported package evidence runner OS." >&2
              exit 1
              ;;
          esac
          printf 'MCLAB_PKG_STARTUP_EVIDENCE=build/validation/%s/pkg-%s/package_startup.json\n' \
            "$MCLAB_EVIDENCE_SHA" "$RUNNER_OS" >> "$GITHUB_ENV"

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/tools/supply-chain.txt
            requirements/locks/build.txt
            requirements/locks/package.txt

      - name: Install pinned Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          mkdir -p build/validation/supply-chain-Linux
          sudo /usr/bin/python3 scripts/install_ubuntu_system_packages.py --install --output build/validation/supply-chain-Linux/ubuntu-system-packages.json

      - name: Install desktop, test, and packaging dependencies
        run: python scripts/install_locked.py --allow-external-env package

      - name: Select package-profile Python
        shell: bash
        run: echo "MCLAB_PACKAGE_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Audit package-profile licenses
        shell: bash
        run: python scripts/audit_supply_chain.py licenses --target-python "$MCLAB_PACKAGE_PYTHON" --profile package --output build/validation/supply-chain-${RUNNER_OS}/python-licenses.json

      - name: Validate package-profile license inventory
        shell: bash
        run: python .agents/validation/check_license_inventory.py --evidence build/validation/supply-chain-${RUNNER_OS}/python-licenses.json --runner-os "$RUNNER_OS"

      - name: Upload target supply-chain evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mclab-supply-chain-${{ runner.os }}
          path: build/validation/supply-chain-${{ runner.os }}
          if-no-files-found: error
          retention-days: 14

      - name: Install and verify pinned Panda assets
        run: |
          python -m mclab assets install
          python -m mclab assets verify

      - name: Windows compatibility launcher repair matrix
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MCLAB_SELF_TEST: "1"
          MCLAB_APP_AUTO_QUIT_MS: "750"
        run: |
          $repo = (Get-Location).Path
          $launcher = Join-Path $repo "run_mclab.cmd"
          $venv = Join-Path $repo ".venv"
          $venvPython = Join-Path $venv "Scripts\python.exe"
          $pandaScene = Join-Path $repo "third_party\mujoco_menagerie\franka_emika_panda\scene.xml"

          if (Test-Path $venv) {
            throw "Expected no .venv before the clean compatibility-launcher check."
          }

          Push-Location $env:RUNNER_TEMP
          try {
            & $launcher
            if ($LASTEXITCODE -ne 0) {
              throw "Clean run_mclab.cmd failed with exit code $LASTEXITCODE."
            }
          } finally {
            Pop-Location
          }

          & $venvPython -c "import mclab, PySide6"
          if ($LASTEXITCODE -ne 0) {
            throw "Clean run_mclab.cmd did not install the desktop runtime."
          }
          if (-not (Test-Path $pandaScene)) {
            throw "Clean run_mclab.cmd did not install the pinned Panda scene."
          }

          Remove-Item -Recurse -Force $venv
          python -m venv $venv
          if ($LASTEXITCODE -ne 0) {
            throw "Could not construct the Qt-missing compatibility state."
          }
          & $venvPython scripts/install_locked.py dev
          if ($LASTEXITCODE -ne 0) {
            throw "Could not construct the dev-only compatibility state."
          }
          & $venvPython -c "import mclab"
          if ($LASTEXITCODE -ne 0) {
            throw "The dev-only venv must still import mclab."
          }
          & $venvPython -c "import PySide6" 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "The dev-only venv unexpectedly retained PySide6."
          }
          if (-not (Test-Path $pandaScene)) {
            throw "The dev-only state must retain the Panda scene."
          }

          Push-Location $env:RUNNER_TEMP
          try {
            & $launcher
            if ($LASTEXITCODE -ne 0) {
              throw "Qt-missing run_mclab.cmd repair failed with exit code $LASTEXITCODE."
            }
          } finally {
            Pop-Location
          }

          & $venvPython -c "import mclab, PySide6"
          if ($LASTEXITCODE -ne 0) {
            throw "run_mclab.cmd did not repair the Qt-missing venv."
          }
          & $venvPython -m pip check
          if ($LASTEXITCODE -ne 0) {
            throw "The repaired compatibility environment failed pip check."
          }

      - name: Windows recommended launcher setup smoke
        if: runner.os == 'Windows'
        shell: cmd
        run: call START_HERE.cmd --setup-only

      - name: Linux recommended launcher setup smoke
        if: runner.os == 'Linux'
        shell: bash
        run: ./start_here.sh --setup-only

      - name: macOS recommended launcher setup smoke
        if: runner.os == 'macOS'
        shell: bash
        run: ./START_HERE.command --setup-only

      - name: Select recommended-launcher Python
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "MCLAB_NEWCOMER_PYTHON=$PWD/.venv/Scripts/python.exe" >> "$GITHUB_ENV"
          else
            echo "MCLAB_NEWCOMER_PYTHON=$PWD/.venv/bin/python" >> "$GITHUB_ENV"
          fi

      - name: Newcomer source setup diagnostics
        shell: bash
        run: '"$MCLAB_NEWCOMER_PYTHON" -m mclab doctor --json'

      - name: Newcomer README and runtime CLI contract
        shell: bash
        run: '"$MCLAB_NEWCOMER_PYTHON" .agents/validation/check_readme_contract.py --runtime-cli'

      - name: Desktop catalog and Qt offscreen smoke
        shell: bash
        run: '"$MCLAB_NEWCOMER_PYTHON" -m mclab app --self-test --lang en'

      - name: Lab01 headless replay artifact smoke
        shell: bash
        run: >-
          "$MCLAB_NEWCOMER_PYTHON" -m mclab run lab01
          --config configs/lab01_msd/default.yaml
          --headless --plot --plots essential
          --output-dir outputs/ci_lab01

      - name: Verify newcomer report and plot contract
        shell: bash
        run: >-
          "$MCLAB_NEWCOMER_PYTHON" -c "from pathlib import Path;
          from scripts.bootstrap_and_run import verify_output_artifacts;
          verify_output_artifacts(Path('outputs/ci_lab01'), expect_plots=True)"

      - name: Report responsive and axe audit
        if: runner.os == 'Linux'
        run: >-
          python scripts/audit_report_ui.py
          --report run=outputs/ci_lab01/report.html
          --report index=outputs/index.html
          --output /tmp/mclab-report-ui-audit

      - name: Desktop foundation tests
        run: >-
          python -m pytest -q -rs
          tests/test_application.py
          tests/test_batch.py
          tests/test_output_cleanup.py
          tests/test_cli_imports.py
          tests/test_build_desktop.py
          tests/test_package_startup.py

      - name: Saved-run cleanup confirmation audit
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: xcb
        run: >-
          xvfb-run -a python scripts/audit_desktop_ui.py
          --output /tmp/mclab-cleanup-ui-audit
          --case batch_running_results_replay_guard_640_ko
          --case batch_running_empty_results_guard_640_ko
          --case results_batch_delete_guard_640_ko
          --case results_manage_640_ko
          --case results_manage_200pct_en
          --case results_quarantine_confirm_wrong_640_ko
          --case results_quarantine_confirm_exact_200pct_en
          --case results_manage_focus_return_640_ko
          --case results_delete_640_ko
          --case completed_evidence_retry_keyboard_640_ko
          --case batch_running_results_rerun_guard_640_ko
          --case batch_running_explore_guard_1280_en
          --case background_results_manage_guard_640_ko
          --case batch_running_results_manage_guard_640_ko
          --case batch_running_unrelated_delete_640_ko
          --case background_delete_backend_guard_640_ko
          --case batch_running_replay_backend_guard_640_ko
          --case batch_running_rerun_backend_guard_640_ko

      - name: Upload cleanup UI audit evidence
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mclab-cleanup-ui-audit
          path: /tmp/mclab-cleanup-ui-audit
          retention-days: 7

      - name: Create isolated package-build environment
        shell: bash
        run: |
          package_env="$RUNNER_TEMP/mclab-package-build"
          python -m venv "$package_env"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            package_python="$package_env/Scripts/python.exe"
          else
            package_python="$package_env/bin/python"
          fi
          "$package_python" scripts/install_locked.py --allow-external-env package
          echo "MCLAB_BUILD_PYTHON=$package_python" >> "$GITHUB_ENV"

      - name: Build unsigned one-folder app
        shell: bash
        run: '"$MCLAB_BUILD_PYTHON" scripts/build_desktop.py --clean'

      - name: Verify packaged app and diagnostics
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            app="dist/MCLab/MCLab.exe"
          else
            app="dist/MCLab/MCLab"
          fi
          "$app" app --self-test --lang en
          "$app" doctor --json

      - name: Verify package identity and size evidence
        shell: bash
        run: '"$MCLAB_BUILD_PYTHON" scripts/build_desktop.py --verify-only'

      - name: Run packaged startup readiness gate
        id: package_startup
        timeout-minutes: 10
        shell: bash
        run: >-
          "$MCLAB_BUILD_PYTHON" scripts/audit_package_startup.py
          --bundle-root dist/MCLab
          --package-root dist/MCLab-package
          --runner-os "$RUNNER_OS"
          --workflow-sha "$MCLAB_EVIDENCE_SHA"
          --temp-root "$RUNNER_TEMP"
          --output "$MCLAB_PKG_STARTUP_EVIDENCE"

      - name: Upload packaged startup readiness evidence
        if: always() && steps.package_startup.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mclab-pkg-startup-${{ runner.os }}-${{ env.MCLAB_EVIDENCE_SHA }}
          path: ${{ env.MCLAB_PKG_STARTUP_EVIDENCE }}
          if-no-files-found: error
          retention-days: 90

      - name: Upload unsigned development package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MCLab-${{ runner.os }}-unsigned-development
          path: |
            dist/MCLab
            dist/MCLab-package
          if-no-files-found: error
          retention-days: 7
