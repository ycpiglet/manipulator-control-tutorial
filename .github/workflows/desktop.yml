name: Desktop app smoke and unsigned builds

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop:
    name: Unsigned development build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libegl1 \
            libgl1 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            xauth \
            xvfb

      - name: Install desktop, test, and packaging dependencies
        run: python -m pip install -e ".[app,dev,package]"

      - name: Cache pinned Panda assets
        id: panda-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: third_party/mujoco_menagerie/franka_emika_panda
          key: panda-71f066ad-${{ runner.os }}

      - name: Windows compatibility launcher repair matrix
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MCLAB_SELF_TEST: "1"
          MCLAB_APP_AUTO_QUIT_MS: "750"
        run: |
          $repo = (Get-Location).Path
          $launcher = Join-Path $repo "run_mclab.cmd"
          $venv = Join-Path $repo ".venv"
          $venvPython = Join-Path $venv "Scripts\python.exe"
          $pandaScene = Join-Path $repo "third_party\mujoco_menagerie\franka_emika_panda\scene.xml"

          if (Test-Path $venv) {
            throw "Expected no .venv before the clean compatibility-launcher check."
          }

          Push-Location $env:RUNNER_TEMP
          try {
            & $launcher
            if ($LASTEXITCODE -ne 0) {
              throw "Clean run_mclab.cmd failed with exit code $LASTEXITCODE."
            }
          } finally {
            Pop-Location
          }

          & $venvPython -c "import mclab, PySide6"
          if ($LASTEXITCODE -ne 0) {
            throw "Clean run_mclab.cmd did not install the desktop runtime."
          }
          if (-not (Test-Path $pandaScene)) {
            throw "Clean run_mclab.cmd did not install the pinned Panda scene."
          }

          Remove-Item -Recurse -Force $venv
          python -m venv $venv
          if ($LASTEXITCODE -ne 0) {
            throw "Could not construct the Qt-missing compatibility state."
          }
          & $venvPython -m pip install -e ".[dev]"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not construct the dev-only compatibility state."
          }
          & $venvPython -c "import mclab"
          if ($LASTEXITCODE -ne 0) {
            throw "The dev-only venv must still import mclab."
          }
          & $venvPython -c "import PySide6" 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "The dev-only venv unexpectedly retained PySide6."
          }
          if (-not (Test-Path $pandaScene)) {
            throw "The dev-only state must retain the Panda scene."
          }

          Push-Location $env:RUNNER_TEMP
          try {
            & $launcher
            if ($LASTEXITCODE -ne 0) {
              throw "Qt-missing run_mclab.cmd repair failed with exit code $LASTEXITCODE."
            }
          } finally {
            Pop-Location
          }

          & $venvPython -c "import mclab, PySide6"
          if ($LASTEXITCODE -ne 0) {
            throw "run_mclab.cmd did not repair the Qt-missing venv."
          }
          & $venvPython -m pip check
          if ($LASTEXITCODE -ne 0) {
            throw "The repaired compatibility environment failed pip check."
          }

      - name: Windows recommended launcher setup smoke
        if: runner.os == 'Windows'
        shell: cmd
        run: call START_HERE.cmd --setup-only

      - name: Linux recommended launcher setup smoke
        if: runner.os == 'Linux'
        shell: bash
        run: ./start_here.sh --setup-only

      - name: macOS recommended launcher setup smoke
        if: runner.os == 'macOS'
        shell: bash
        run: ./START_HERE.command --setup-only

      - name: Select recommended-launcher Python
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "MCLAB_NEWCOMER_PYTHON=$PWD/.venv/Scripts/python.exe" >> "$GITHUB_ENV"
          else
            echo "MCLAB_NEWCOMER_PYTHON=$PWD/.venv/bin/python" >> "$GITHUB_ENV"
          fi

      - name: Newcomer source setup diagnostics
        shell: bash
        run: '"$MCLAB_NEWCOMER_PYTHON" -m mclab doctor --json'

      - name: Newcomer README and runtime CLI contract
        shell: bash
        run: '"$MCLAB_NEWCOMER_PYTHON" .agents/validation/check_readme_contract.py --runtime-cli'

      - name: Desktop catalog and Qt offscreen smoke
        shell: bash
        run: '"$MCLAB_NEWCOMER_PYTHON" -m mclab app --self-test --lang en'

      - name: Lab01 headless replay artifact smoke
        shell: bash
        run: >-
          "$MCLAB_NEWCOMER_PYTHON" -m mclab run lab01
          --config configs/lab01_msd/default.yaml
          --headless --plot --plots essential
          --output-dir outputs/ci_lab01

      - name: Verify newcomer report and plot contract
        shell: bash
        run: >-
          "$MCLAB_NEWCOMER_PYTHON" -c "from pathlib import Path;
          from scripts.bootstrap_and_run import verify_output_artifacts;
          verify_output_artifacts(Path('outputs/ci_lab01'), expect_plots=True)"

      - name: Report responsive and axe audit
        if: runner.os == 'Linux'
        run: >-
          python scripts/audit_report_ui.py
          --report run=outputs/ci_lab01/report.html
          --report index=outputs/index.html
          --output /tmp/mclab-report-ui-audit

      - name: Desktop foundation tests
        run: >-
          python -m pytest -q -rs
          tests/test_application.py
          tests/test_batch.py
          tests/test_output_cleanup.py
          tests/test_cli_imports.py

      - name: Saved-run cleanup confirmation audit
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: xcb
        run: >-
          xvfb-run -a python scripts/audit_desktop_ui.py
          --output /tmp/mclab-cleanup-ui-audit
          --case batch_running_results_replay_guard_640_ko
          --case batch_running_empty_results_guard_640_ko
          --case results_batch_delete_guard_640_ko
          --case results_manage_640_ko
          --case results_manage_200pct_en
          --case results_quarantine_confirm_wrong_640_ko
          --case results_quarantine_confirm_exact_200pct_en
          --case results_manage_focus_return_640_ko
          --case results_delete_640_ko
          --case completed_evidence_retry_keyboard_640_ko
          --case batch_running_results_rerun_guard_640_ko
          --case batch_running_explore_guard_1280_en
          --case background_results_manage_guard_640_ko
          --case batch_running_results_manage_guard_640_ko
          --case batch_running_unrelated_delete_640_ko
          --case background_delete_backend_guard_640_ko
          --case batch_running_replay_backend_guard_640_ko
          --case batch_running_rerun_backend_guard_640_ko

      - name: Upload cleanup UI audit evidence
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mclab-cleanup-ui-audit
          path: /tmp/mclab-cleanup-ui-audit
          retention-days: 7

      - name: Build unsigned one-folder app
        run: python scripts/build_desktop.py --clean

      - name: Verify packaged app and diagnostics
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            app="dist/MCLab/MCLab.exe"
          else
            app="dist/MCLab/MCLab"
          fi
          "$app" app --self-test --lang en
          "$app" doctor --json

      - name: Mark build as unsigned development artifact
        shell: bash
        run: echo "UNSIGNED DEVELOPMENT BUILD - NOT FOR PRODUCTION" > dist/MCLab/UNSIGNED-DEVELOPMENT-BUILD.txt

      - name: Upload unsigned development bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: MCLab-${{ runner.os }}-unsigned-development
          path: dist/MCLab
          retention-days: 7
