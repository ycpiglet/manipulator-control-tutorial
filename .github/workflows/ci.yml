name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulator:
    name: Simulator lint and tests
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev tools
        run: python -m pip install -e ".[dev]"

      - name: Cache MuJoCo Menagerie Panda assets
        id: menagerie-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: third_party/mujoco_menagerie
          key: menagerie-franka-panda-v1

      - name: Fetch MuJoCo Menagerie (Panda only, sparse)
        if: steps.menagerie-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/google-deepmind/mujoco_menagerie.git \
            third_party/mujoco_menagerie
          git -C third_party/mujoco_menagerie sparse-checkout set franka_emika_panda

      - name: Ruff lint
        run: python -m ruff check src tests scripts .agents/validation

      - name: Pytest with coverage floor
        run: python -m pytest -q --cov=mclab --cov-report=term --cov-fail-under=80

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
          cache: pip

      - name: Python 3.10 minimum-version cleanup and CLI tests
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest -q -rs tests/test_output_cleanup.py tests/test_cli_imports.py

  paper-gates:
    name: Paper citation and formula gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Verify immutable GitHub Action references
        run: python .agents/validation/check_workflow_action_pins.py

      - name: Citation and provenance coverage
        run: python .agents/validation/check_citation_coverage.py

      - name: Manuscript formula and marker checks
        run: python .agents/validation/validate_robotics_foundations.py

  paper-build:
    name: Paper LaTeX build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Tectonic
        uses: WtfJoke/setup-tectonic@8a63d072f8390efdff59da7fa08aa49e3c1f5e1b # v3.1.5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tectonic-version: "0.16.9"

      - name: Build paper PDF
        run: tectonic --keep-logs paper/main.tex

      - name: Check PDF was produced
        run: |
          test -f paper/main.pdf
          size=$(stat -c%s paper/main.pdf)
          echo "paper/main.pdf size: ${size} bytes"
          test "$size" -gt 100000

      - name: Upload PDF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: paper-main-pdf
          path: paper/main.pdf
          retention-days: 14
