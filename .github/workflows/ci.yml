name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulator:
    name: Simulator lint and tests
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/tools/uv.txt
            requirements/tools/supply-chain.txt
            requirements/locks/build.txt
            requirements/locks/dev.txt

      - name: README contract and local links
        run: python .agents/validation/check_readme_contract.py

      - name: Dependency lock policy
        run: python .agents/validation/check_dependency_locks.py

      - name: Dependency lock byte reproducibility
        run: python scripts/manage_dependency_locks.py --check

      - name: Asset supply-chain policy
        run: python .agents/validation/check_asset_supply_chain.py

      - name: Supply-chain static policy
        run: python .agents/validation/check_supply_chain_policy.py

      - name: License inventory contract
        run: python .agents/validation/check_license_inventory.py

      - name: Generate deterministic universal SBOM inputs
        run: |
          python scripts/generate_sbom_inputs.py --source-commit "$GITHUB_SHA" --output /tmp/mclab-sbom-inputs-1.json
          python scripts/generate_sbom_inputs.py --source-commit "$GITHUB_SHA" --output /tmp/mclab-sbom-inputs-2.json
          cmp /tmp/mclab-sbom-inputs-1.json /tmp/mclab-sbom-inputs-2.json

      - name: Audit reviewed Python vulnerabilities
        run: python scripts/audit_supply_chain.py vulnerabilities --output build/validation/supply-chain/python-vulnerabilities.json

      - name: Upload universal supply-chain evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mclab-supply-chain-universal
          path: |
            /tmp/mclab-sbom-inputs-1.json
            build/validation/supply-chain/python-vulnerabilities.json
          if-no-files-found: error
          retention-days: 14

      - name: Install package with dev tools
        run: python scripts/install_locked.py --allow-external-env dev

      - name: Python 3.11 mypy exact-debt checker
        run: python .agents/validation/check_mypy_baseline.py --python-version 3.11

      - name: README runtime CLI contract
        run: python .agents/validation/check_readme_contract.py --runtime-cli

      - name: Install and verify pinned Panda assets
        run: |
          python -m mclab assets install
          python -m mclab assets verify

      - name: Ruff lint
        run: python -m ruff check src tests scripts .agents/validation

      - name: Pytest with coverage floor
        run: python -m pytest -q --cov=mclab --cov-report=term --cov-fail-under=80

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/locks/build.txt
            requirements/locks/dev.txt

      - name: Install package with dev tools on Python 3.10
        run: python scripts/install_locked.py --allow-external-env dev

      - name: Python 3.10 mypy exact-debt checker
        run: python .agents/validation/check_mypy_baseline.py --python-version 3.10

      - name: Python 3.10 minimum-version cleanup and CLI tests
        run: |
          python .agents/validation/check_readme_contract.py --runtime-cli
          python -m pytest -q -rs tests/test_output_cleanup.py tests/test_cli_imports.py

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/locks/build.txt
            requirements/locks/dev.txt

      - name: Install package with dev tools on Python 3.12
        run: python scripts/install_locked.py --allow-external-env dev

      - name: Python 3.12 mypy exact-debt checker
        run: python .agents/validation/check_mypy_baseline.py --python-version 3.12

      - name: Python 3.12 upper-version CLI tests
        run: |
          python .agents/validation/check_readme_contract.py --runtime-cli
          python -m pytest -q -rs tests/test_cli_imports.py tests/test_doctor.py

  paper-gates:
    name: Paper citation and formula gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install workflow checker parser
        run: >-
          python -m pip install
          --disable-pip-version-check
          --isolated
          --no-input
          --no-deps
          --force-reinstall
          --only-binary=:all:
          --require-hashes
          -r .agents/validation/workflow-check-requirements.txt

      - name: Verify immutable GitHub Action references
        run: python .agents/validation/check_workflow_action_pins.py

      - name: Citation and provenance coverage
        run: python .agents/validation/check_citation_coverage.py

      - name: Manuscript formula and marker checks
        run: python .agents/validation/validate_robotics_foundations.py

  paper-build:
    name: Paper LaTeX build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Tectonic
        uses: WtfJoke/setup-tectonic@eb29fd68b7d3f76011906b6e45ea4320c8de5d2f # v4.0.5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tectonic-version: "0.16.9"

      - name: Build paper PDF
        run: tectonic --keep-logs paper/main.tex

      - name: Check PDF was produced
        run: |
          test -f paper/main.pdf
          size=$(stat -c%s paper/main.pdf)
          echo "paper/main.pdf size: ${size} bytes"
          test "$size" -gt 100000

      - name: Upload PDF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paper-main-pdf
          path: paper/main.pdf
          retention-days: 14
